<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candy Crush – UML Class Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a0a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 24px 48px;
  font-family: 'Sora', sans-serif;
}

h1 {
  color: #fff;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-align: center;
}
.subtitle {
  color: #b98dff;
  font-size: 12px;
  letter-spacing: 3px;
  margin-bottom: 32px;
  text-align: center;
  text-transform: uppercase;
}

/* ─── LEGEND ─── */
.legend {
  display: flex;
  gap: 24px;
  margin-bottom: 28px;
  background: rgba(255,255,255,0.05);
  padding: 10px 20px;
  border-radius: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.leg { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #ccc; }
.leg-line { width: 36px; height: 2px; }
.leg-line.assoc { background: #7ec8e3; }
.leg-line.dep { background: #ffd166; border-top: 2px dashed #ffd166; height: 0; }
.leg-line.use { background: #9b89f5; }
.arr-hollow { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 13px solid #7ec8e3; }
.arr-filled { width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 11px solid #ffd166; }

/* ─── CANVAS ─── */
.canvas {
  width: 1120px;
  position: relative;
}

svg.diagram {
  width: 1120px;
  height: 780px;
  display: block;
}

/* ─── UML BOX STYLES ─── */
.cls-box { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }

/* Header fills */
.hdr-enum   { fill: #7b2d8b; }
.hdr-class  { fill: #1a4fa0; }
.hdr-main   { fill: #0d6b3e; }
.hdr-panel  { fill: #8b3a10; }
.hdr-input  { fill: #5a3510; }

/* Box body */
.body-fill  { fill: #12082a; }
.body-alt   { fill: #0e0620; }

/* Text */
.t-title    { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 13.5px; fill: #fff; }
.t-stereo   { font-family: 'Sora', sans-serif; font-style: italic; font-weight: 400; font-size: 10px; fill: #ddd; }
.t-field    { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #a8d8ea; }
.t-method   { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #c3e88d; }
.t-method-i { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ffd166; font-style: italic; }
.t-enum-val { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; fill: #f78c6c; font-weight: 600; }
.t-note     { font-family: 'Sora', sans-serif; font-size: 10px; fill: #999; font-style: italic; }
.sep        { stroke: rgba(255,255,255,0.15); stroke-width: 1; }

/* Arrows */
.arr-assoc  { stroke: #7ec8e3; stroke-width: 1.8; fill: none; }
.arr-dep    { stroke: #ffd166; stroke-width: 1.6; fill: none; stroke-dasharray: 6,4; }
.arr-comp   { stroke: #9b89f5; stroke-width: 1.8; fill: none; }
.arr-lbl    { font-family: 'Sora', sans-serif; font-size: 10px; fill: #aaa; font-style: italic; }

</style>
</head>
<body>

<h1>Candy Crush — UML Class Diagram</h1>
<div class="subtitle">Java Swing Implementation · 6 source files</div>

<div class="legend">
  <div class="leg"><div class="leg-line assoc"></div> Association / Composition</div>
  <div class="leg"><div style="width:36px;height:0;border-top:2px dashed #ffd166"></div> Dependency (uses)</div>
  <div class="leg"><div style="width:36px;height:0;border-top:2px solid #9b89f5"></div> Creates / Holds ref</div>
</div>

<div class="canvas">
<svg class="diagram" viewBox="0 0 1120 780" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr-open" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
    <polyline points="0,0 10,4 0,8" fill="none" stroke="#7ec8e3" stroke-width="1.8"/>
  </marker>
  <marker id="arr-open-dep" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
    <polyline points="0,0 10,4 0,8" fill="none" stroke="#ffd166" stroke-width="1.6"/>
  </marker>
  <marker id="arr-open-comp" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
    <polyline points="0,0 10,4 0,8" fill="none" stroke="#9b89f5" stroke-width="1.8"/>
  </marker>
  <marker id="diamond-fill" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto">
    <polygon points="0,4 6,0 12,4 6,8" fill="#9b89f5"/>
  </marker>
</defs>

<!-- ══════════════════════════════════════════════════════════
     1.  «enum» SpecialType   (top-left)
     ══════════════════════════════════════════════════════════ -->
<g class="cls-box">
  <rect x="30" y="30" width="190" height="162" rx="6" fill="#12082a" stroke="#7b2d8b" stroke-width="1.8"/>
  <rect x="30" y="30" width="190" height="38" rx="6" fill="#7b2d8b"/>
  <rect x="30" y="54" width="190" height="14" fill="#7b2d8b"/>
  <text x="125" y="44" text-anchor="middle" class="t-stereo">«enum»</text>
  <text x="125" y="58" text-anchor="middle" class="t-title">SpecialType</text>
  <line x1="30" y1="68" x2="220" y2="68" class="sep"/>
  <!-- values -->
  <text x="44" y="86"  class="t-enum-val">NORMAL</text>
  <text x="44" y="103" class="t-enum-val">STRIPE_H</text>
  <text x="44" y="120" class="t-enum-val">STRIPE_V</text>
  <text x="44" y="137" class="t-enum-val">WRAPPED</text>
  <text x="44" y="154" class="t-enum-val">CHOCO</text>
  <line x1="30" y1="162" x2="220" y2="162" class="sep"/>
  <text x="125" y="181" text-anchor="middle" class="t-note">// candy special types</text>
</g>

<!-- ══════════════════════════════════════════════════════════
     2.  Candy   (center-top)
     ══════════════════════════════════════════════════════════ -->
<g class="cls-box">
  <rect x="310" y="30" width="270" height="190" rx="6" fill="#12082a" stroke="#1a4fa0" stroke-width="1.8"/>
  <rect x="310" y="30" width="270" height="38" rx="6" fill="#1a4fa0"/>
  <rect x="310" y="54" width="270" height="14" fill="#1a4fa0"/>
  <text x="445" y="56" text-anchor="middle" class="t-title">Candy</text>
  <!-- fields -->
  <line x1="310" y1="68" x2="580" y2="68" class="sep"/>
  <text x="322" y="86"  class="t-field">+ color: int</text>
  <text x="322" y="103" class="t-field">+ specialType: SpecialType</text>
  <text x="322" y="120" class="t-field">+ image: BufferedImage</text>
  <text x="322" y="137" class="t-field">+ activated: boolean</text>
  <!-- methods -->
  <line x1="310" y1="147" x2="580" y2="147" class="sep"/>
  <text x="322" y="165" class="t-method">+ Candy(color, specialType,</text>
  <text x="322" y="180" class="t-method">    image: BufferedImage)</text>
  <text x="322" y="198" class="t-note">// activated prevents chain-explosion loop</text>
  <text x="322" y="213" class="t-note">// color = -1 for Choco</text>
</g>

<!-- ══════════════════════════════════════════════════════════
     3.  Board   (center)
     ══════════════════════════════════════════════════════════ -->
<g class="cls-box">
  <rect x="310" y="300" width="360" height="450" rx="6" fill="#12082a" stroke="#1a4fa0" stroke-width="1.8"/>
  <rect x="310" y="300" width="360" height="38" rx="6" fill="#1a4fa0"/>
  <rect x="310" y="324" width="360" height="14" fill="#1a4fa0"/>
  <text x="490" y="326" text-anchor="middle" class="t-title">Board</text>
  <!-- fields -->
  <line x1="310" y1="338" x2="670" y2="338" class="sep"/>
  <text x="322" y="354" class="t-field">+ ROWS, COLS: int = 8</text>
  <text x="322" y="369" class="t-field">+ TILE_SIZE: int = 85</text>
  <text x="322" y="384" class="t-field">- grid: Candy[][]</text>
  <text x="322" y="399" class="t-field">- candyImages: BufferedImage[]</text>
  <text x="322" y="414" class="t-field">- bgImage: BufferedImage</text>
  <text x="322" y="429" class="t-field">- swapR1,C1,R2,C2: int</text>
  <text x="322" y="444" class="t-field">+ score: int</text>
  <text x="322" y="459" class="t-field">+ movesLeft: int = 20</text>
  <text x="322" y="474" class="t-field">+ isGameOver: boolean</text>
  <text x="322" y="489" class="t-field">+ inputLocked: boolean</text>
  <text x="322" y="504" class="t-field">+ needsGravity: boolean</text>
  <text x="322" y="519" class="t-field">- scoreLabel: JLabel</text>
  <!-- methods -->
  <line x1="310" y1="529" x2="670" y2="529" class="sep"/>
  <text x="322" y="545" class="t-method">+ Board(scoreLabel: JLabel)</text>
  <text x="322" y="560" class="t-method">+ checkMatches(): boolean</text>
  <text x="322" y="575" class="t-method">+ applyGravity(): void</text>
  <text x="322" y="590" class="t-method">+ swapCandies(r1,c1,r2,c2): void</text>
  <text x="322" y="605" class="t-method">+ getCandy(r,c): Candy</text>
  <text x="322" y="620" class="t-method">+ hasPossibleMoves(): boolean</text>
  <text x="322" y="635" class="t-method">+ shuffleBoard(): void</text>
  <text x="322" y="650" class="t-method">+ activateChocoCombo(…): void</text>
  <text x="322" y="665" class="t-method">+ activateStripedStriped(…): void</text>
  <text x="322" y="680" class="t-method">+ activateWrappedWrapped(…): void</text>
  <text x="322" y="695" class="t-method">+ activateStripedWrapped(…): void</text>
  <text x="322" y="710" class="t-method">+ updateUI(): void</text>
  <text x="322" y="725" class="t-method">+ resetLastSwap(): void</text>
  <text x="322" y="740" class="t-method-i">- loadImages(), initializeBoard()</text>
  <text x="322" y="738" class="t-note" dy="7"> </text>
</g>

<!-- ══════════════════════════════════════════════════════════
     4.  GamePanel  (right)
     ══════════════════════════════════════════════════════════ -->
<g class="cls-box">
  <rect x="730" y="300" width="350" height="340" rx="6" fill="#12082a" stroke="#8b3a10" stroke-width="1.8"/>
  <rect x="730" y="300" width="350" height="38" rx="6" fill="#8b3a10"/>
  <rect x="730" y="324" width="350" height="14" fill="#8b3a10"/>
  <text x="905" y="318" text-anchor="middle" class="t-stereo">extends JPanel</text>
  <text x="905" y="332" text-anchor="middle" class="t-title">GamePanel</text>
  <!-- fields -->
  <line x1="730" y1="338" x2="1080" y2="338" class="sep"/>
  <text x="742" y="354" class="t-field">- board: Board</text>
  <text x="742" y="369" class="t-field">- inputHandler: InputHandler</text>
  <text x="742" y="384" class="t-field">- cascadeTimer: Timer</text>
  <text x="742" y="399" class="t-field">- animTimer: Timer</text>
  <text x="742" y="414" class="t-field">- isAnimatingSwap: boolean</text>
  <text x="742" y="429" class="t-field">- animR1,C1,R2,C2: int</text>
  <text x="742" y="444" class="t-field">- animProgress: float</text>
  <!-- methods -->
  <line x1="730" y1="454" x2="1080" y2="454" class="sep"/>
  <text x="742" y="470" class="t-method">+ GamePanel(board: Board)</text>
  <text x="742" y="485" class="t-method">+ getOffsetX(): int</text>
  <text x="742" y="500" class="t-method">+ getOffsetY(): int</text>
  <text x="742" y="515" class="t-method">+ startCascade(): void</text>
  <text x="742" y="530" class="t-method">+ playSwapAnimation(r1,c1,r2,c2,</text>
  <text x="742" y="545" class="t-method">    onComplete: Runnable): void</text>
  <text x="742" y="560" class="t-method-i">- setupCascadeTimer(): void</text>
  <text x="742" y="575" class="t-method-i">- drawCandy(g2d,candy,x,y): void</text>
  <text x="742" y="590" class="t-method-i">- paintComponent(g): void</text>
  <text x="742" y="610" class="t-note">// cascade: gravity → match → repeat</text>
  <text x="742" y="626" class="t-note">// triggers shuffle on deadlock</text>
</g>

<!-- ══════════════════════════════════════════════════════════
     5.  InputHandler  (far right)
     ══════════════════════════════════════════════════════════ -->
<g class="cls-box">
  <rect x="730" y="30" width="350" height="240" rx="6" fill="#12082a" stroke="#5a3510" stroke-width="1.8"/>
  <rect x="730" y="30" width="350" height="38" rx="6" fill="#5a3510"/>
  <rect x="730" y="54" width="350" height="14" fill="#5a3510"/>
  <text x="905" y="44" text-anchor="middle" class="t-stereo">extends MouseAdapter</text>
  <text x="905" y="58" text-anchor="middle" class="t-title">InputHandler</text>
  <!-- fields -->
  <line x1="730" y1="68" x2="1080" y2="68" class="sep"/>
  <text x="742" y="84"  class="t-field">- board: Board</text>
  <text x="742" y="99"  class="t-field">- panel: GamePanel</text>
  <text x="742" y="114" class="t-field">- selectedRow: int = -1</text>
  <text x="742" y="129" class="t-field">- selectedCol: int = -1</text>
  <!-- methods -->
  <line x1="730" y1="139" x2="1080" y2="139" class="sep"/>
  <text x="742" y="155" class="t-method">+ InputHandler(board, panel)</text>
  <text x="742" y="170" class="t-method">+ getSelectedRow(): int</text>
  <text x="742" y="185" class="t-method">+ getSelectedCol(): int</text>
  <text x="742" y="200" class="t-method">+ mousePressed(e: MouseEvent): void</text>
  <text x="742" y="225" class="t-note">// handles selection, swap, special-combo</text>
  <text x="742" y="241" class="t-note">// detection and animation trigger</text>
</g>

<!-- ══════════════════════════════════════════════════════════
     6.  Main   (bottom-left)
     ══════════════════════════════════════════════════════════ -->
<g class="cls-box">
  <rect x="30" y="480" width="260" height="130" rx="6" fill="#12082a" stroke="#0d6b3e" stroke-width="1.8"/>
  <rect x="30" y="480" width="260" height="38" rx="6" fill="#0d6b3e"/>
  <rect x="30" y="504" width="260" height="14" fill="#0d6b3e"/>
  <text x="160" y="496" text-anchor="middle" class="t-title">Main</text>
  <!-- fields -->
  <line x1="30" y1="518" x2="290" y2="518" class="sep"/>
  <text x="42" y="534" class="t-note">// entry point</text>
  <!-- methods -->
  <line x1="30" y1="542" x2="290" y2="542" class="sep"/>
  <text x="42" y="558" class="t-method">+ main(args: String[]): void</text>
  <text x="42" y="580" class="t-note">// JFrame + CardLayout</text>
  <text x="42" y="596" class="t-note">// MENU → GAME screen nav</text>
</g>

<!-- ══════════════════════════════════════════════════════════
     RELATIONSHIPS
     ══════════════════════════════════════════════════════════ -->

<!-- Candy --uses--> SpecialType  (field: specialType) -->
<line x1="310" y1="110" x2="220" y2="110" class="arr-dep" marker-end="url(#arr-open-dep)"/>
<text x="228" y="103" class="arr-lbl">«use»</text>

<!-- Board --holds--> Candy[][] (composition) -->
<line x1="490" y1="240" x2="490" y2="300" class="arr-comp" marker-end="url(#arr-open-comp)" marker-start="url(#diamond-fill)"/>
<text x="500" y="278" class="arr-lbl">1 *</text>

<!-- Board --uses--> SpecialType -->
<line x1="310" y1="450" x2="220" y2="170" class="arr-dep" stroke-dasharray="5,4" marker-end="url(#arr-open-dep)"/>
<text x="218" y="330" class="arr-lbl">«use»</text>

<!-- GamePanel --holds--> Board -->
<line x1="730" y1="400" x2="670" y2="400" class="arr-assoc" marker-end="url(#arr-open)"/>
<text x="678" y="393" class="arr-lbl">board</text>

<!-- GamePanel --holds--> InputHandler -->
<line x1="905" y1="300" x2="905" y2="270" class="arr-assoc" marker-end="url(#arr-open)"/>
<text x="914" y="288" class="arr-lbl">inputHandler</text>

<!-- InputHandler --refs--> Board -->
<line x1="730" y1="84" x2="670" y2="370" class="arr-dep" marker-end="url(#arr-open-dep)"/>
<text x="680" y="220" class="arr-lbl" transform="rotate(-75,680,220)">«use»</text>

<!-- InputHandler --refs--> GamePanel (back-ref for repaint/animation) -->
<line x1="1080" y1="150" x2="1092" y2="300" class="arr-dep" stroke-dasharray="5,4" marker-end="url(#arr-open-dep)"/>
<text x="1093" y="235" class="arr-lbl">panel</text>

<!-- Main --creates--> Board -->
<line x1="290" y1="540" x2="310" y2="500" class="arr-dep" stroke-dasharray="5,4" marker-end="url(#arr-open-dep)"/>
<text x="270" y="522" class="arr-lbl">«create»</text>

<!-- Main --creates--> GamePanel -->
<line x1="260" y1="560" x2="730" y2="430" class="arr-dep" stroke-dasharray="5,4" marker-end="url(#arr-open-dep)"/>
<text x="420" y="490" class="arr-lbl">«create»</text>

<!-- note bubble: cascade loop -->
<rect x="730" y="680" width="370" height="62" rx="6" fill="rgba(255,209,102,0.08)" stroke="#ffd166" stroke-dasharray="4,3" stroke-width="1.2"/>
<text x="744" y="700" class="arr-lbl" fill="#ffd166" font-size="11">Cascade loop (GamePanel.cascadeTimer):</text>
<text x="744" y="716" class="arr-lbl" fill="#ffd166" font-size="11">applyGravity() → checkMatches() → repeat</text>
<text x="744" y="732" class="arr-lbl" fill="#ffd166" font-size="11">→ hasPossibleMoves()? shuffle : unlock input</text>

</svg>
</div>

</body>
</html>
